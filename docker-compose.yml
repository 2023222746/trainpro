version: '3.8'
services:
  app:
    build: .
    container_name: trainpro_app
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=db
      - DB_DATABASE=trainpro
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: trainpro_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: trainpro_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: trainpro
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
