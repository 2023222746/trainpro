version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: trainpro-nginx
    ports:
      - "80:80"     # serve directly on localhost
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: trainpro-php
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=trainpro
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: trainpro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: trainpro
    ports:
      - "3306:3306"   # works if XAMPP/Oracle MySQL is stopped
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
